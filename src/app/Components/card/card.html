@if(!objPkm()){
    <p>Carregando...</p>
} @else {
    <div class="card">
        <div class="cardHeader">
            <h4>{{objPkm()?.nome}}</h4>
            <p>tipos: {{objPkm()?.tipo1}} {{ objPkm()?.tipo2? 'e ' + objPkm()?.tipo2 : '' }}</p>
        </div>
        <p class="id">Pokedex: {{objPkm()?.id}}</p>
        <img class="sprite" [src]="objPkm()?.sprite" alt="">
    </div>
}
