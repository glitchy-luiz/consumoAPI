<app-buscar (pesquisa)="pesq($event)"></app-buscar>
<button (click)="home()">Voltar</button>

@if(carregando()){
    <h2>Carregando...</h2>
} @else if (error()) {
    <p>{{error()}}</p>
} @else if (!pkms()[0].nome) {
    <div class="grid">
        @for (dados of pokemonsList(); track dados; let i = $index) {
            @defer (on viewport) {
                <app-card [pokemon]="dados"></app-card>
            } @placeholder {
                <p>placeholder enquanto carrega</p>
            }
        }
    </div>
} @else {
    <div class="grid">
        @for(pkm of pkms(); track $index){
            <app-card [pokemon]="pkm"></app-card>
        }
    </div>
}
